<!DOCTYPE html>
<html>
<head>
    <title>Add Task</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">

<h2>Add Task</h2>

<form method="POST">
    {% csrf_token %}

    <input class="form-control mb-2" name="title" placeholder="Task Name">

    <input class="form-control mb-2" type="number" name="duration" placeholder="Duration (minutes)">

    <label>Deadline</label>
    <input class="form-control mb-2" type="datetime-local" name="deadline">

    <button class="btn btn-success">Add Task</button>
</form>

</body>
</html>
